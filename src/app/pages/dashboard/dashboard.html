<div class="dashboard-page">
  @if (result(); as r) {
    <!-- Header -->
    <div class="header">
      <h1 class="title gradient-text">DateSense</h1>
      <p class="subtitle">Your conversation analysis results</p>
    </div>

    <div class="page-container-wide content">
      <!-- Score Cards -->
      <div class="scores-grid">
        <app-score-card label="Attraction Score" [score]="r.attraction_score" color="pink" />
        <app-score-card label="Ghosting Risk" [score]="r.ghosting_risk" color="amber" />
        <app-score-card label="Conversation Health" [score]="r.conversation_health" color="emerald" />
      </div>

      <!-- Insights -->
      <mat-card appearance="outlined" class="insights-card">
        <mat-card-content>
          <h3 class="section-title">Insights</h3>
          <ul class="insights-list">
            @for (insight of r.insights; track $index) {
              <li class="insight-item">
                <mat-icon class="insight-icon">check_circle</mat-icon>
                <span>{{ insight }}</span>
              </li>
            }
          </ul>
        </mat-card-content>
      </mat-card>

      <!-- Reply Suggestions -->
      <app-reply-list [replies]="r.reply_suggestions" />

      <!-- Date Ideas -->
      <app-date-ideas [ideas]="r.date_ideas" />

      <!-- Screenshot Previews -->
      @if (imageUrls().length > 0) {
        <mat-card appearance="outlined" class="screenshot-card">
          <mat-card-content>
            <h3 class="section-title">Conversation Screenshots</h3>
            <div class="screenshot-grid">
              @for (url of imageUrls(); track $index) {
                <div class="screenshot-wrap">
                  <img [src]="url" [alt]="'Chat screenshot ' + ($index + 1)" class="screenshot-img" />
                </div>
              }
            </div>
          </mat-card-content>
        </mat-card>
      }

      <!-- Back Button -->
      <div class="back-row">
        <button mat-stroked-button color="primary" (click)="goBack()">
          <mat-icon>arrow_back</mat-icon>
          Analyze Another Screenshot
        </button>
      </div>
    </div>
  }
</div>
