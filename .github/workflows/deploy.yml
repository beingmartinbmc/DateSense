name: Deploy DateSense to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build application
      run: npx ng build --base-href /DateSense/

    - name: Create .nojekyll and 404.html for SPA routing
      run: |
        touch dist/DateSense/.nojekyll
        cat > dist/DateSense/404.html << 'EOF'
        <!doctype html>
        <html lang="en">
        <head>
          <meta charset="utf-8">
          <title>DateSense</title>
          <base href="/DateSense/">
          <meta content="width=device-width, initial-scale=1" name="viewport">
          <script>
            var pathSegmentsToKeep = 1;
            var l = window.location;
            l.replace(
              l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
              l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
              l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
              (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
              l.hash
            );
          </script>
        </head>
        <body></body>
        </html>
        EOF

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './dist/DateSense'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
